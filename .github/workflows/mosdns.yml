name: Make MosDNS ipk package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch latest release tag from mosdns
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/sbwml/luci-app-mosdns/releases | grep "tag_name" | grep v5 | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//;s/ //')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Download mosdns IPK files (aarch64_cortex-a53 only)
        run: |
          echo "Downloading MosDNS IPK files..."

          # 获取下载链接
          curl -sk --connect-timeout 10 "https://api.github.com/repos/sbwml/luci-app-mosdns/releases" | grep "browser_download_url" | grep "$latest_tag" > releases.txt

          if [ $? -ne 0 ]; then
            echo "Failed to get version information"
            exit 1
          fi

          mkdir -p output

          # 下载文件函数
          download_file() {
            local url=$1
            local filename=$(basename "$url")
            echo "Downloading $filename ..."
            curl --connect-timeout 30 -m 600 -kLo "output/$filename" "$url"
            if [ $? -ne 0 ]; then
              echo "Error! Download $filename failed."
              exit 1
            fi
          }

          # 提取下载链接 (只保留 aarch64_cortex-a53 和 all 通用包)
          mosdns_aarch64=$(grep "browser_download_url" releases.txt | grep "mosdns_5" | grep "aarch64_cortex-a53.ipk" | head -1 | awk -F '"' '{print $4}')
          v2dat_aarch64=$(grep "browser_download_url" releases.txt | grep "v2dat_" | grep "aarch64_cortex-a53.ipk" | head -1 | awk -F '"' '{print $4}')
          luci_app=$(grep "browser_download_url" releases.txt | grep "luci-app-mosdns_" | head -1 | awk -F '"' '{print $4}')
          luci_i18n=$(grep "browser_download_url" releases.txt | grep "luci-i18n-mosdns-zh-cn" | head -1 | awk -F '"' '{print $4}')
          geoip=$(grep "browser_download_url" releases.txt | grep "v2ray-geoip" | head -1 | awk -F '"' '{print $4}')
          geosite=$(grep "browser_download_url" releases.txt | grep "v2ray-geosite" | head -1 | awk -F '"' '{print $4}')

          # 下载所有包到 output/
          download_file "$mosdns_aarch64"
          download_file "$v2dat_aarch64"
          download_file "$luci_app"
          download_file "$luci_i18n"
          download_file "$geoip"
          download_file "$geosite"

          echo "Download completed."

      - name: Upload ipk files to release
        uses: softprops/action-gh-release@v2.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.LATEST_TAG }}
          name: "mosdns-${{ env.LATEST_TAG }}"
          files: output/*.ipk
          token: ${{ secrets.GITHUB_TOKEN }}
