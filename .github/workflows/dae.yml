name: Make DAE ipk package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 🚀 下载 dae 的所有 ipk
        run: |
          chmod +x shell/dae.sh
          ./shell/dae.sh

      - name: 📦 收集 ipk
        id: pack
        run: |
          mkdir -p output

          # 优先使用 aarch64_cortex-a53，否则 aarch64_generic
          if [ -d "aarch64_cortex-a53" ] && [ -n "$(ls aarch64_cortex-a53/*.ipk 2>/dev/null)" ]; then
            PLATFORM="aarch64_cortex-a53"
          elif [ -d "aarch64_generic" ] && [ -n "$(ls aarch64_generic/*.ipk 2>/dev/null)" ]; then
            PLATFORM="aarch64_generic"
          else
            echo "❌ 未找到可用架构的 ipk"
            exit 1
          fi

          echo "使用架构: $PLATFORM"
          cp "$PLATFORM"/*.ipk output/

          # 提取版本号（从 luci-app-dae 的 ipk 文件名）
          APP_IPK=$(ls output/luci-app-dae_*.ipk | head -n 1)
          VERSION=$(basename "$APP_IPK" | sed -n 's/^luci-app-dae_\(.*\)_all\.ipk$/\1/p')
          if [ -z "$VERSION" ]; then
            echo "❌ 无法提取版本号"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 清理版本号（去掉特殊字符）
        id: clean_version
        run: |
          version="${{ steps.pack.outputs.version }}"
          version=${version%%~*}
          echo "VERSION_CLEAN=$version" >> $GITHUB_ENV
          echo "cleaned_version=$version" >> $GITHUB_OUTPUT

      - name: 📤 上传到 Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: "dae-${{ steps.clean_version.outputs.cleaned_version }}"
          name: "dae-${{ steps.clean_version.outputs.cleaned_version }}"
          files: output/*.ipk
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
