name: Make Argon Theme ipk package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 安装依赖
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: 🚀 下载 argon 所有 ipk
        run: |
          chmod +x shell/argon.sh
          ./shell/argon.sh

      - name: 📦 收集 ipk
        id: pack
        run: |
          mkdir -p output
          cp aarch64_generic/*.ipk output/

          ARGON_IPK=$(ls output/luci-theme-argon_*.ipk | head -n 1)
          VERSION=$(basename "$ARGON_IPK" | sed -n 's/^luci-theme-argon_\([^-]*-[^_]*\)_.*$/\1/p')
          if [ -z "$VERSION" ]; then
            echo "❌ 无法提取版本号"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 📤 上传到 Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: "argon-${{ steps.pack.outputs.version }}"
          name: "argon-${{ steps.pack.outputs.version }}"
          files: output/*.ipk
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
