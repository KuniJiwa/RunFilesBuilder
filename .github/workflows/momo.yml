name: Make momo ipk package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch latest release tag from momo
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-momo/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
          echo "tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Download latest momo files (aarch64_cortex-a53 only)
        run: |
          curl -LO $(curl -s https://api.github.com/repos/nikkinikki-org/OpenWrt-momo/releases/latest | grep -oP '"browser_download_url":\s*".*momo_aarch64_cortex-a53-openwrt-24.10.tar.gz"' | cut -d '"' -f 4)
          tar --one-top-level=momo_aarch64_cortex-a53-openwrt-24.10 -xvzf momo_aarch64_cortex-a53-openwrt-24.10.tar.gz

      - name: Organize files and rename
        run: |
          mkdir -p output
          cp momo_aarch64_cortex-a53-openwrt-24.10/*.ipk output/
          pushd output >/dev/null
          for file in *~*.ipk; do
            [ -e "$file" ] || continue
            new_file="$(echo "$file" | tr -d '~')"
            if [ -e "$new_file" ]; then
              echo "目标文件已存在，跳过: $new_file"
              continue
            fi
            mv "$file" "$new_file"
            echo "已重命名: $file -> $new_file"
          done
          popd >/dev/null

      - name: Upload ipk files to release
        uses: softprops/action-gh-release@v2.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.LATEST_TAG }}
          name: "momo-${{ env.LATEST_TAG }}"
          files: output/*.ipk
          token: ${{ secrets.GITHUB_TOKEN }}
